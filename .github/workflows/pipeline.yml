name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
# ─────────────────────────────────────────
# STAGE 1: LINT
# ─────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python - API
        run: flake8 api/ --max-line-length=100

      - name: Lint Python - Worker
        run: flake8 worker/ --max-line-length=100

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Install ESLint
        run: cd frontend && npm install eslint --save-dev

      - name: Lint JavaScript
        run: cd frontend && npx eslint app.js 

      - name: Lint Dockerfiles with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

# ─────────────────────────────────────────
# STAGE 2: TEST
# ─────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          pip install fastapi uvicorn redis pytest pytest-cov httpx

      - name: Run tests with coverage
        run: |
          cd api
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

# ─────────────────────────────────────────
# STAGE 3: BUILD
# ─────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest

# ─────────────────────────────────────────
# STAGE 4: SECURITY SCAN
# ─────────────────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Rebuild images into this job's registry
        run: |
          docker buildx build --push -t localhost:5000/api:latest ./api
          docker buildx build --push -t localhost:5000/worker:latest ./worker
          docker buildx build --push -t localhost:5000/frontend:latest ./frontend

      - name: Pull images for scanning
        run: |
          docker pull localhost:5000/api:latest
          docker pull localhost:5000/worker:latest
          docker pull localhost:5000/frontend:latest

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/api:latest
          format: table
           severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
           scanners: vuln

      - name: Scan Worker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/worker:latest
          format:  table
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          scanners: vuln

      - name: Scan Frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/frontend:latest
          format: table
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          scanners: vuln

      - name: Upload Trivy SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif-results
          path: "*.sarif"

# ─────────────────────────────────────────
# STAGE 5: INTEGRATION TEST
# ─────────────────────────────────────────
  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start full stack
        run: |
          docker compose up --build -d
          sleep 15

      - name: Wait for services to be healthy
        run: |
          for i in {1..20}; do
            if curl -sf http://localhost:3000/health; then
              echo "Stack is healthy"
              break
            fi
            echo "Waiting... attempt $i"
            sleep 5
          done

      - name: Submit a job
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost:3000/submit)
          echo "Response: $RESPONSE"
          JOB_ID=$(echo $RESPONSE | python3 -c "import sys, json; print(json.load(sys.stdin)['job_id'])")
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Poll until job completes
        run: |
          for i in {1..15}; do
            STATUS=$(curl -sf http://localhost:3000/status/${{ env.JOB_ID }} | python3 -c "import sys, json; print(json.load(sys.stdin)['status'])")
            echo "Status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "✅ Job completed successfully"
              exit 0
            fi
            sleep 3
          done
          echo "❌ Job did not complete in time"
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down

# ─────────────────────────────────────────
# STAGE 6: DEPLOY
# ─────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rolling update - API
        run: |
          docker compose up -d --no-deps --build api

          for i in {1..12}; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' \
              $(docker compose ps -q api) 2>/dev/null || echo "starting")
            echo "Health: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "✅ API is healthy"
              exit 0
            fi
            sleep 5
          done
          echo "❌ API failed health check — keeping old container"
          docker compose up -d --no-deps api
          exit 1

      - name: Rolling update - Worker
        run: |
          docker compose up -d --no-deps --build worker

      - name: Rolling update - Frontend
        run: |
          docker compose up -d --no-deps --build frontend

          for i in {1..12}; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' \
              $(docker compose ps -q frontend) 2>/dev/null || echo "starting")
            echo "Health: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "✅ Frontend is healthy"
              exit 0
            fi
            sleep 5
          done
          echo "❌ Frontend failed health check — keeping old container"
          docker compose up -d --no-deps frontend
          exit 1
